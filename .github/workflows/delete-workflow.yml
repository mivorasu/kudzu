name: delete-workflow

on:
  schedule:
    - cron: 0 18 * * 1,3,5
  workflow_dispatch:

jobs:
  del:
    strategy:
      matrix:
        repository: ["kudzu", "zp-tool"]
    runs-on: ubuntu-latest
    steps:
      - uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.TOKEN }}
          repository: ${{ github.actor }}/${{ matrix.repository }}
          retain_days: 1
          keep_minimum_runs: 0
